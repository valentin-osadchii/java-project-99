logging:
  level:
    root: WARN
    org:
      springframework:
        security: DEBUG

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: never
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent_output: true
  instancio:
    bean:
      validation:
        enabled: true

  output:
    ansi:
      enabled: always

rsa:
  private-key: classpath:certs/private.pem
  public-key: classpath:certs/public.pem
